<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook - Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
<div class="reg-page">
<div class="reg-container">
 </div>
<h1>Get started on Facebook</h1>
<h6>
<p>Create an account to connect with friends, family and communities of people who share your interests.</p>
</h6>
         
<label class="reg-label">Name</label>
<div class="reg-name-row">
<input type="text" class="reg-input" placeholder="First name">
<input type="text" class="reg-input" placeholder="Surname">
</div>
 <label class="reg-label">Date of birth <span class="reg-info-icon"></span></label>
<div class="reg-dob-row">
<select class="reg-select" id="day-select">
<option value="">Day</option>
<option>1</option><option>2</option><option>3</option><option>4</option>
<option>5</option><option>6</option><option>7</option><option>8</option>
<option>9</option><option>10</option><option>11</option><option>12</option>
<option>13</option><option>14</option><option>15</option><option>16</option>
<option>17</option><option>18</option><option>19</option><option>20</option>
<option>21</option><option>22</option><option>23</option><option>24</option>
<option>25</option><option>26</option><option>27</option><option>28</option>
<option>29</option><option>30</option><option>31</option>
</select>
<select class="reg-select" name="month">
<option value="">Month</option>
<option>January</option><option>February</option><option>March</option>
<option>April</option><option>May</option><option>June</option>
<option>July</option><option>August</option><option>September</option>
<option>October</option><option>November</option><option>December</option>
</select>
<select class="reg-select" name="year">
<option value="">Year</option>
<option>2026</option><option>2025</option><option>2024</option>
<option>2023</option><option>2022</option><option>2021</option>
<option>2020</option><option>2019</option><option>2018</option>
<option>2017</option><option>2016</option><option>2015</option>
<option>2014</option><option>2013</option><option>2012</option>
<option>2011</option><option>2010</option><option>2009</option>
<option>2008</option><option>2007</option><option>2006</option>
<option>2005</option><option>2004</option><option>2003</option>
<option>2002</option><option>2001</option><option>2000</option>
<option>1999</option><option>1998</option><option>1997</option>
</select>

</div>
<class="reg-label">Gender <span class="reg-info-icon"></span></label>
<select class="reg-select reg-select-full" name="gender">
<option value="">Select your gender</option>
<option value="male">Male</option>
 <option value="female">Female</option>
</select>
 
           
<label class="reg-label">Mobile number or email address</label>
<input type="text" class="reg-input reg-input-full" placeholder="Mobile number or email address">
           
<label class="reg-label">Password</label>
<input type="password" class="reg-input reg-input-full" placeholder="Password">
 
            
<button class="reg-submit-btn">Submit</button>
 
<a href="login.html" class="reg-login-btn">I already have an account</a>
